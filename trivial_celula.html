<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial de la Cèl·lula - 6è Primària</title>
    <style>
        :root {
            --primary: #2ecc71;
            --error: #e74c3c;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
        }

        .header { text-align: center; margin-bottom: 20px; }
        
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s;
        }

        .question {
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options {
            display: grid;
            gap: 10px;
        }

        button {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            text-align: left;
        }

        button:hover:not(:disabled) {
            border-color: var(--primary);
            background: #f9fffb;
        }

        button.correct {
            background-color: var(--primary) !important;
            color: white;
            border-color: var(--primary);
        }

        button.wrong {
            background-color: var(--error) !important;
            color: white;
            border-color: var(--error);
        }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-style: italic;
        }

        #next-btn {
            display: none;
            margin: 20px auto 0;
            padding: 10px 25px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .results { text-align: center; }
        .score { font-size: 3rem; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game">
        <div class="header">
            <h2>🔬 Què en saps de la cèl·lula?</h2>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        
        <div id="question" class="question">Carregant pregunta...</div>
        <div id="options" class="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">Següent pregunta →</button>
    </div>

    <div id="result-screen" class="results" style="display:none;">
        <h2>Repte Finalitzat!</h2>
        <p>La teva puntuació és:</p>
        <div class="score" id="final-score">0</div>
        <p id="message"></p>
        <button onclick="location.reload()" style="text-align:center; margin-top:20px;">Torna a jugar</button>
    </div>
</div>

<script>
    const quizData = [
        {
            q: "Quina part de la cèl·lula conté l'ADN i dirigeix el seu funcionament?",
            a: ["Membrana", "Nucli", "Citoplasma", "Vacúol"],
            correct: 1,
            info: "El nucli actua com el 'cervell' de la cèl·lula."
        },
        {
            q: "Com es diu la capa que controla què entra i surt de la cèl·lula?",
            a: ["Paret rígida", "Citoplasma", "Membrana plasmàtica", "Cloroplast"],
            correct: 2,
            info: "La membrana és com la frontera o la 'pell' de la cèl·lula."
        },
        {
            q: "On es troben flotant els orgànuls cel·lulars?",
            a: ["Al citoplasma", "Dins del nucli", "Fora de la cèl·lula", "A les mitocòndries"],
            correct: 0,
            info: "El citoplasma és una substància gelatinosa que omple l'interior."
        },
        {
            q: "Quina d'aquestes parts és EXCLUSIVA de les cèl·lules vegetals?",
            a: ["Mitocòndria", "Membrana", "Nucli", "Cloroplast"],
            correct: 3,
            info: "Els cloroplasts permeten a les plantes fer la fotosíntesi."
        },
        {
            q: "Quin orgànul s'encarrega de produir l'energia per a la cèl·lula?",
            a: ["Vacúol", "Mitocòndria", "Aparell de Golgi", "Ribosoma"],
            correct: 1,
            info: "Les mitocòndries són les 'centrals elèctriques' cel·lulars."
        }
    ];

    let currentQ = 0;
    let score = 0;

    function loadQuestion() {
        const qData = quizData[currentQ];
        document.getElementById("question").innerText = qData.q;
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";
        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";

        // Actualitzar barra de progrés
        document.getElementById("progress-fill").style.width = `${(currentQ / quizData.length) * 100}%`;

        qData.a.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        const correct = quizData[currentQ].correct;
        const buttons = document.querySelectorAll(".options button");
        
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) {
            btn.classList.add("correct");
            score++;
            showFeedback("Correcte! " + quizData[currentQ].info, "#d4edda", "#155724");
        } else {
            btn.classList.add("wrong");
            buttons[correct].classList.add("correct");
            showFeedback("Ho sento... " + quizData[currentQ].info, "#f8d7da", "#721c24");
        }
        
        document.getElementById("next-btn").style.display = "block";
    }

    function showFeedback(text, bg, color) {
        const f = document.getElementById("feedback");
        f.innerText = text;
        f.style.backgroundColor = bg;
        f.style.color = color;
        f.style.display = "block";
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("game").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = `${score} / ${quizData.length}`;
        
        let msg = "";
        if (score === quizData.length) msg = "Ets un autèntic biòleg/òloga! 🌟";
        else if (score >= 3) msg = "Molt bé! Fas bona feina. 👍";
        else msg = "Bon intent! Repassa una mica més els orgànuls. 📚";
        document.getElementById("message").innerText = msg;
    }

    loadQuestion();
</script>

</body>
</html>
